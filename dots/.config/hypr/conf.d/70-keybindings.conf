###################
### MY PROGRAMS ###
###################
$terminal = kitty
$browser = firefox
$fileManager = nautilus
$lockScreen = hyprlock
$logout = wlogout

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

#################
### LAUNCHERS ###
#################
bind = $mainMod, C, killactive,

bind = $mainMod, SPACE, exec, rofi -show drun

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager

bind = $mainMod SHIFT, Q, exec, $logout
bind = $mainMod, Q, exec, $lockScreen

bind = $mainMod SHIFT, W, exec, wallpaper.sh
bind = $mainMod, Z, exec, wpchanger.sh ~/Pictures/Wallpapers/windows-7-official-3840x2160-13944.jpg

bind = $mainMod, S, exec, screenshot.sh --instant # Take a screenshot
bind = $mainMod SHIFT, S, exec, quickshell -c HyprQuickFrame -n # HyprQuickFrame: Edit, Save, or Copy

###############
### TOGGLES ###
###############
bind = $mainMod, W, exec, toggle-waybar.sh
bind = $mainMod, D, exec, toggle-edp.sh

##############
### LAYOUT ###
##############
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, layoutmsg, togglesplit # dwindle
bind = $mainMod, F, fullscreen
bind = $mainMod, N, togglefloating,
bind = $mainMod, M, layoutmsg, movetoroot # dwindle

bind = $mainMod, TAB, focusmonitor, +1
bind = $mainMod SHIFT, TAB, movecurrentworkspacetomonitor, +1

# Move focus with mainMod + vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Swap window with mainMod + shift + vim keys
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod CTRL, 1, exec, movealltoworkspace.sh 1  # Move all windows to workspace 1
bind = $mainMod CTRL, 2, exec, movealltoworkspace.sh 2  # Move all windows to workspace 2
bind = $mainMod CTRL, 3, exec, movealltoworkspace.sh 3  # Move all windows to workspace 3
bind = $mainMod CTRL, 4, exec, movealltoworkspace.sh 4  # Move all windows to workspace 4
bind = $mainMod CTRL, 5, exec, movealltoworkspace.sh 5  # Move all windows to workspace 5
bind = $mainMod CTRL, 6, exec, movealltoworkspace.sh 6  # Move all windows to workspace 6
bind = $mainMod CTRL, 7, exec, movealltoworkspace.sh 7  # Move all windows to workspace 7
bind = $mainMod CTRL, 8, exec, movealltoworkspace.sh 8  # Move all windows to workspace 8
bind = $mainMod CTRL, 9, exec, movealltoworkspace.sh 9  # Move all windows to workspace 9
bind = $mainMod CTRL, 0, exec, movealltoworkspace.sh 10 # Move all windows to workspace 10

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ===== Resize Submap Start ===== #
bind = $mainMod, R, submap, resize
submap = resize

binde = SHIFT, L, resizeactive, 40 0
binde = SHIFT, H, resizeactive, -40 0
binde = SHIFT, K, resizeactive, 0 -40
binde = SHIFT, J, resizeactive, 0 40

binde = , L, moveactive, 40 0
binde = , H, moveactive, -40 0
binde = , K, moveactive, 0 -40
binde = , J, moveactive, 0 40

bind = , C, centerwindow,

bind = , escape, submap, reset
submap = reset
# ===== Resize Submap End ===== #

###############
### FN KEYS ###
###############
bindel = ,XF86AudioRaiseVolume, exec, volume.sh --inc # Raise Volume
bindel = ,XF86AudioLowerVolume, exec, volume.sh --dec # Lower Volume

bindel = ,XF86AudioMute, exec, volume.sh --toggle # Mute Audio
bindel = ,XF86AudioMicMute, exec, volume.sh --toggle-mic # Mute Microphone

bindel = ,XF86MonBrightnessUp, exec, brightness.sh increase 5 # Increase monitor brightness
bindel = ,XF86MonBrightnessDown, exec, brightness.sh decrease 5 # Decrease monitor brightness

# Keyboard backlight
bind = ,XF86Display, exec, \
    if [ $(brightnessctl -d *::kbd_backlight get) -eq 0 ]; then \
      brightnessctl -d *::kbd_backlight set 100%; \
    else \
      brightnessctl -d *::kbd_backlight set 0%; \
    fi

bind = ,XF86WLAN, exec, \
    if nmcli networking | grep -q enabled; \
    then nmcli networking off; \
    else nmcli networking on; \
    fi
bind = ,XF86NotificationCenter, exec, swaync-client -t -sw

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

###################
### HW SWITCHES ###
###################
bindl = , switch:on:Lid Switch, exec, toggle-edp.sh off
bindl = , switch:off:Lid Switch, exec, toggle-edp.sh on
