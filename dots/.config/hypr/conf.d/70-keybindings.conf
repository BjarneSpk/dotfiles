###################
### MY PROGRAMS ###
###################
$terminal = kitty
$browser = firefox
$fileManager = nautilus

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, Q, exec, wlogout
bind = $mainMod, Q, exec, hyprlock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, N, togglefloating,
bind = $mainMod, SPACE, exec, rofi -show drun
# bind = $mainMod, TAB, exec, rofi -show window
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, togglesplit, # dwindle
bind = $mainMod, F, fullscreen
# bind = $mainMod, V, exec, sel=$(cliphist list | rofi -dmenu) && printf "%s" "$sel" | cliphist decode | wl-copy

bind = $mainMod, S, exec, screenshot.sh --instant # Take a screenshot
# Opens HyprQuickFrame - Decided on-the-fly whether to Edit, Save, or Copy
bind = $mainMod ALT, S, exec, quickshell -c HyprQuickFrame -n

bind = $mainMod, W, exec, toggle-waybar.sh
bind = $mainMod, D, exec, toggle-edp.sh
bind = $mainMod ALT, W, exec, wallpaper.sh
bind = $mainMod, TAB, movecurrentworkspacetomonitor, +1

bind = $mainMod, Y, exec, wallpaper.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod CTRL, 1, exec, movealltoworkspace.sh 1  # Move all windows to workspace 1
bind = $mainMod CTRL, 2, exec, movealltoworkspace.sh 2  # Move all windows to workspace 2
bind = $mainMod CTRL, 3, exec, movealltoworkspace.sh 3  # Move all windows to workspace 3
bind = $mainMod CTRL, 4, exec, movealltoworkspace.sh 4  # Move all windows to workspace 4
bind = $mainMod CTRL, 5, exec, movealltoworkspace.sh 5  # Move all windows to workspace 5
bind = $mainMod CTRL, 6, exec, movealltoworkspace.sh 6  # Move all windows to workspace 6
bind = $mainMod CTRL, 7, exec, movealltoworkspace.sh 7  # Move all windows to workspace 7
bind = $mainMod CTRL, 8, exec, movealltoworkspace.sh 8  # Move all windows to workspace 8
bind = $mainMod CTRL, 9, exec, movealltoworkspace.sh 9  # Move all windows to workspace 9
bind = $mainMod CTRL, 0, exec, movealltoworkspace.sh 10 # Move all windows to workspace 10

bind = $mainMod, Z, exec, wpchanger.sh ~/Pictures/Wallpapers/windows-7-official-3840x2160-13944.jpg
# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Switch to a submap called `resize`.
bind = $mainMod, R, submap, resize

# Start a submap called "resize".
submap = resize

# Set repeatable binds for resizing the active window.
binde = SHIFT, L, resizeactive, 40 0
binde = SHIFT, H, resizeactive, -40 0
binde = SHIFT, K, resizeactive, 0 -40
binde = SHIFT, J, resizeactive, 0 40

binde = , L, moveactive, 40 0
binde = , H, moveactive, -40 0
binde = , K, moveactive, 0 -40
binde = , J, moveactive, 0 40

bind = , C, centerwindow,

# Use `reset` to go back to the global submap
bind = , escape, submap, reset

# Reset the submap, which will return to the global submap
submap = reset

# Keybinds further down will be global again...

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, volume.sh --inc
bindel = ,XF86AudioLowerVolume, exec, volume.sh --dec
bindel = ,XF86AudioMute, exec, volume.sh --toggle
bindel = ,XF86AudioMicMute, exec, volume.sh --toggle-mic
bindel = ,XF86MonBrightnessUp, exec, brightness.sh increase 5
bindel = ,XF86MonBrightnessDown, exec, brightness.sh decrease 5

# Keyboard backlight
bindel = ,XF86WLAN, exec, brightnessctl -d *::kbd_backlight set +33%
bindel = ,XF86Display, exec, brightnessctl -d *::kbd_backlight set 33%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# trigger when the switch is turning on
bindl = , switch:on:Lid Switch, exec, toggle-edp.sh off
# trigger when the switch is turning off
bindl = , switch:off:Lid Switch, exec, toggle-edp.sh on
